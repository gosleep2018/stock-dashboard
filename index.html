<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>📊 美股每日选股报告</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
body{background:#0f172a;color:#e2e8f0;font-family:-apple-system,'PingFang SC',sans-serif}
.card{background:#1e293b;border:1px solid #334155;border-radius:12px}
.up{color:#22c55e}.down{color:#ef4444}.neu{color:#94a3b8}
.tab-a{background:#3b82f6;color:#fff}.tab-i{background:#1e293b;color:#94a3b8}
.pt-a{background:#3b82f6;color:#fff;border-radius:9999px;border:none;cursor:pointer}
.pt-i{background:#1e293b;color:#94a3b8;border:1px solid #334155;border-radius:9999px;cursor:pointer}
.det{display:none}.det.open{display:block}
.hb{font-size:11px;padding:3px 10px;border-radius:6px;cursor:pointer;border:1px solid #334155;background:#1e293b;color:#94a3b8;white-space:nowrap}
.hb.a{border-color:#3b82f6;color:#60a5fa;background:#1e3a5f}
.ba{font-size:11px;padding:2px 8px;border-radius:4px;cursor:pointer;background:#1e3a5f;color:#60a5fa;border:none}
.br{font-size:11px;padding:2px 8px;border-radius:4px;cursor:pointer;background:#450a0a;color:#f87171;border:none}
.ba:hover{background:#2563eb;color:#fff}.br:hover{background:#dc2626;color:#fff}
input[type=text]{background:#0f172a;border:1px solid #334155;border-radius:8px;color:#e2e8f0;padding:8px 12px;width:100%;outline:none}
input[type=text]:focus{border-color:#3b82f6}
.bm{background:#14532d;color:#4ade80;font-size:11px;padding:1px 6px;border-radius:4px}
.bb{background:#450a0a;color:#f87171;font-size:11px;padding:1px 6px;border-radius:4px}
.bc{background:#92400e;color:#fbbf24;font-size:11px;padding:1px 6px;border-radius:4px}
.bs{background:#1e3a5f;color:#60a5fa;font-size:11px;padding:1px 6px;border-radius:4px}
.kw{width:130px;height:65px;flex-shrink:0;border-radius:8px;overflow:hidden;background:#0f172a}
.kw iframe{width:100%;height:100%;border:none;pointer-events:none}
</style>
</head>
<body class="min-h-screen">

<div class="sticky top-0 z-10 px-4 py-3 flex justify-between items-center" style="background:#0f172a;border-bottom:1px solid #1e293b">
  <div><span class="font-bold">📊 美股选股日报</span><span id="rdate" class="text-xs text-slate-400 ml-2"></span></div>
  <div id="utime" class="text-xs text-slate-500"></div>
</div>

<div class="max-w-2xl mx-auto px-4 py-4 space-y-3">
  <div class="flex gap-2 overflow-x-auto pb-1" id="htabs"></div>

  <div class="card p-4">
    <div class="text-xs text-slate-400 mb-2 font-semibold uppercase tracking-wider">市场概况</div>
    <div class="flex gap-2 mb-3" id="mkt"></div>
    <div id="msum" class="text-sm text-slate-300 leading-relaxed"></div>
  </div>

  <div class="card p-3 flex items-center gap-2 flex-wrap">
    <span class="text-xs text-slate-400">筛选：</span>
    <span class="text-xs px-2 py-0.5 rounded-full" style="background:#1e3a5f;color:#60a5fa">科技股</span>
    <span class="text-xs px-2 py-0.5 rounded-full" style="background:#14532d;color:#4ade80">开盘涨</span>
    <span class="text-xs px-2 py-0.5 rounded-full" style="background:#451a03;color:#fb923c">量比&gt;5x</span>
    <span id="scount" class="ml-auto text-xs text-slate-400"></span>
  </div>

  <div class="flex rounded-xl overflow-hidden border border-slate-700">
    <button id="ts" onclick="switchTab('s')" class="tab-a flex-1 py-2 text-sm font-medium">🔍 今日筛选</button>
    <button id="tp" onclick="switchTab('p')" class="tab-i flex-1 py-2 text-sm font-medium">📋 股票池</button>
  </div>

  <div id="ps"><div id="slist" class="space-y-3"></div></div>

  <div id="pp" class="hidden">
    <div class="flex gap-2 mb-3 flex-wrap">
      <button id="ptcore" onclick="switchPool('core')" class="pt-a text-xs px-3 py-1.5">🔵 核心</button>
      <button id="ptwatch" onclick="switchPool('watch')" class="pt-i text-xs px-3 py-1.5">👀 观察</button>
      <button id="ptopp" onclick="switchPool('opportunity')" class="pt-i text-xs px-3 py-1.5">⚡ 机会</button>
      <button id="pthold" onclick="switchPool('holding')" class="pt-i text-xs px-3 py-1.5">💼 持仓</button>
    </div>
    <div class="card p-3 mb-3">
      <div class="text-xs text-slate-400 mb-2">➕ 手动添加股票到当前池子</div>
      <div class="flex gap-2">
        <input id="addInput" type="text" placeholder="输入股票代码，如 AAPL" maxlength="10"
          onkeydown="if(event.key==='Enter')manualAdd()" style="flex:1;text-transform:uppercase">
        <button onclick="manualAdd()" class="px-4 py-2 rounded-lg text-sm font-medium" style="background:#1e3a5f;color:#60a5fa;border:none;cursor:pointer;white-space:nowrap">添加</button>
      </div>
      <div id="addMsg" class="text-xs mt-1.5 hidden"></div>
    </div>
    <div id="plist" class="space-y-2"></div>
  </div>
</div>

<!-- Modal 选择池子 -->
<div id="modal" class="hidden fixed inset-0 z-50 flex items-end justify-center" style="background:rgba(0,0,0,.75)">
  <div class="card w-full max-w-2xl p-5 rounded-b-none rounded-t-2xl">
    <div class="text-base font-semibold mb-1">加入哪个池子？</div>
    <div id="mtk" class="text-2xl font-bold mb-4 text-blue-400"></div>
    <div class="grid grid-cols-2 gap-2 mb-3">
      <button onclick="confirmAdd('core')" class="py-3 rounded-xl text-sm font-medium" style="background:#1e3a5f;color:#60a5fa;border:none;cursor:pointer">🔵 核心池</button>
      <button onclick="confirmAdd('watch')" class="py-3 rounded-xl text-sm font-medium" style="background:#1e3a5f;color:#60a5fa;border:none;cursor:pointer">👀 观察池</button>
      <button onclick="confirmAdd('opportunity')" class="py-3 rounded-xl text-sm font-medium" style="background:#1e3a5f;color:#60a5fa;border:none;cursor:pointer">⚡ 机会池</button>
      <button onclick="confirmAdd('holding')" class="py-3 rounded-xl text-sm font-medium" style="background:#1a3a1a;color:#4ade80;border:none;cursor:pointer">💼 持仓</button>
    </div>
    <button onclick="closeModal()" class="w-full py-2 rounded-xl text-sm text-slate-400" style="background:#0f172a;border:none;cursor:pointer">取消</button>
  </div>
</div>

<script>

{t:"QQQ",co:"Invesco QQQ Trust",p:604.58,ch:-0.71,vr:0.5,sd:0,sdt:[],su:false,m30:510.20,m60:498.70,mas:"多头",cr:"无穿越",cd:"",fh:-3.5,sc:3,sp:false,news:{h:"纳斯达克100 ETF，科技股整体承压",d:"2026-03-07",se:"中性"}},

{t:"MSFT",co:"Microsoft Corporation",p:411.61,ch:0.23,vr:0.3,sd:0,sdt:[],su:false,m30:415.30,m60:421.80,mas:"空头",cr:"无穿越",cd:"",fh:-8.0,sc:2,sp:false,news:{h:"Azure AI服务增速强劲，Copilot商业化推进",d:"2026-03-05",se:"利好"}},
{t:"GOOGL",co:"Alphabet Inc",p:299.60,ch:-0.43,vr:0.3,sd:0,sdt:[],su:false,m30:185.40,m60:180.90,mas:"多头",cr:"无穿越",cd:"",fh:-5.0,sc:3,sp:false,news:{h:"Gemini AI持续迭代，搜索广告稳健增长",d:"2026-03-04",se:"利好"}},
{t:"ALNT",co:"Allient Inc",p:62.90,ch:1.56,vr:1.3,sd:0,sdt:[],su:false,m30:64.55,m60:60.95,mas:"多头",cr:"无穿越",cd:"",fh:-10.1,sc:3,sp:false,news:{h:"工业精密电机，稳健增长",d:"2026-03-01",se:"中性"}}
]}};

const SCR_TICKERS = ['PRSO','SYNX','TURB','QCLS','AIFF','MRVL','IOT','NA','MVIS','QH'];
const POOL_NAMES = {core:'核心',watch:'观察',opportunity:'机会',holding:'持仓'};

// ═══ 状态（单一数据源）═══
let curDate = '2026-03-07';
let curPool = 'core';
let curTab = 's';
let pendingTicker = '';

const DEF_WL = {
  core:['SPY','QQQ','NVDA','MSFT','GOOGL'].map(t=>({t,note:''})),
  watch:['MRVL','ALNT','IOT'].map(t=>({t,note:''})),
  opportunity:['SYNX','TURB'].map(t=>({t,note:''})),
  holding:[]
};

// wl 结构：{ core: [{t:'SPY',note:'...'}, ...], ... }
let wl = JSON.parse(localStorage.getItem('wl4') || 'null');
if(!wl){ wl = JSON.parse(JSON.stringify(DEF_WL)); save(); }
function save(){ localStorage.setItem('wl4', JSON.stringify(wl)); }

// ═══ 查询函数 ═══
function poolOf(ticker){ for(const[k,a] of Object.entries(wl)){ if(a.some(x=>x.t===ticker)) return k; } return null; }
function inPool(ticker){ return poolOf(ticker) !== null; }
function stockMap(){ const m={}; D[curDate].stocks.forEach(s=>m[s.t]=s); return m; }

// ═══ K线 ═══
function kline(ticker){
  return `<div class="kw"><iframe src="https://www.tradingview.com/miniwidget/#symbol=${ticker}&interval=D&range=1M&hide_side_toolbar=1&allow_symbol_change=0&backgroundColor=%230f172a&lineColor=%2338bdf8&topColor=%231e3a5f22&bottomColor=%230f172a00&locale=zh_CN&save_image=0&colorTheme=dark&chartOnly=1" scrolling="no"></iframe></div>`;
}

// ═══ 卡片渲染 ═══
function card(s, idx, ctx){
  // ctx: 'scr' | 'pool'
  const po = poolOf(s.t);
  let pbtn = '';
  if(ctx==='scr'){
    if(po){
      pbtn = `<span class="bm text-xs">✓${POOL_NAMES[po]}</span>
        <button class="br" data-action="rm" data-ticker="${s.t}">移出</button>`;
    } else {
      pbtn = `<button class="ba" data-action="add" data-ticker="${s.t}" data-co="${s.co}">＋加入池子</button>`;
    }
  } else {
    pbtn = `<button class="br" data-action="rmpool" data-ticker="${s.t}">移出</button>`;
  }

  const stars = '⭐'.repeat(s.sc) || '<span class="neu text-xs">—</span>';
  const cc = s.ch>=0?'up':'down', cs = s.ch>=0?'+':'';
  const spec = s.sp ? `<span style="background:#451a03;color:#fb923c;font-size:11px;padding:1px 6px;border-radius:4px">⚠️小盘</span>` : '';
  const mab = s.mas==='多头'?`<span class="bm">↑多头✅</span>`:`<span class="bb">↓空头⚠️</span>`;
  const crb = s.cr!=='无穿越'?`<span class="bc">${s.cr==='金叉'?'🟡金叉':'💀死叉'} ${s.cd}</span>`:'';
  const sub = s.su?`<span class="bs">⚡突然放量</span>`:'';
  const nc = s.news.se==='利好'?'#4ade80':s.news.se==='利空'?'#f87171':'#94a3b8';
  const ni = s.news.se==='利好'?'📈':s.news.se==='利空'?'📉':'📰';
  const vd = s.sc>=3?'🚀 强势启动':s.sc===2?'👀 值得关注':s.sc===1?'⚠️ 信号偏弱':'❌ 跳过';
  const id = ctx+idx;

  return `<div class="card overflow-hidden" id="card-${ctx}-${s.t}" style="transition:border-color .2s"
      onmouseenter="this.style.borderColor='#4f86f7'" onmouseleave="this.style.borderColor='#334155'">
    <div class="p-3 cursor-pointer" onclick="tog('${id}')">
      <div class="flex items-start gap-3">
        <div class="flex-1 min-w-0">
          <div class="flex items-center gap-1.5 flex-wrap">
            <span class="text-base font-bold">${s.t}</span>
            <span class="text-base font-bold">$${s.p}</span>
            <span class="text-sm font-semibold ${cc}">${cs}${s.ch.toFixed(1)}%</span>
            ${spec}
          </div>
          <div class="text-xs text-slate-400 mt-0.5 truncate">${s.co}</div>
          <div class="flex items-center gap-1.5 mt-1 flex-wrap">
            <span>${stars}</span>
            <span class="text-xs text-slate-400">量<span style="color:#fb923c;font-weight:700">${s.vr}x</span></span>
            <span class="text-xs ${s.fh>-15?'up':'neu'}">高${s.fh}%</span>
          </div>
          <div class="flex gap-1 mt-1 flex-wrap">${mab}${crb}${sub}</div>
          <div class="flex gap-1.5 mt-1.5 flex-wrap pool-btn-area">${pbtn}</div>
        </div>
        ${kline(s.t)}
      </div>
    </div>
    <div id="det-${id}" class="det" style="border-top:1px solid #334155">
      <div class="p-4 space-y-3">
        <div class="grid grid-cols-2 gap-3">
          <div class="rounded-xl p-3 text-sm" style="background:#0f172a">
            <div class="text-xs text-slate-400 mb-1">① 放量情况</div>
            <div class="font-semibold">近10日 <span style="color:#fb923c">${s.sd}</span> 天放量</div>
            <div class="text-xs text-slate-500 mt-1">${s.sdt.length?s.sdt.join(', '):'无'}</div>
            <div class="text-xs mt-1 ${s.su?'up':'neu'}">${s.su?'✅ 近2日突然放量':'近期无突然放量'}</div>
          </div>
          <div class="rounded-xl p-3 text-sm" style="background:#0f172a">
            <div class="text-xs text-slate-400 mb-1">③ 均线状态</div>
            <div class="text-xs">MA30: <span class="font-mono">${s.m30}</span></div>
            <div class="text-xs">MA60: <span class="font-mono">${s.m60}</span></div>
            <div class="text-xs mt-1 font-semibold">${s.cr!=='无穿越'?(s.cr==='金叉'?'🟡金叉 ':'💀死叉 ')+s.cd:'无近期穿越'}</div>
            <div class="text-xs ${s.mas==='多头'?'up':'down'}">${s.mas==='多头'?'↑ 多头排列':'↓ 空头排列'}</div>
          </div>
        </div>
        <div class="rounded-xl p-3 text-sm" style="background:#0f172a">
          <div class="text-xs text-slate-400 mb-1">④ 事件热点</div>
          <div style="color:${nc}">${ni} ${s.news.h}</div>
          <div class="text-xs text-slate-500 mt-1">${s.news.d}</div>
        </div>
        <div class="rounded-xl p-3" style="background:#0f172a">
          <div class="text-xs text-slate-400 mb-1">综合结论</div>
          <div class="text-sm font-semibold">${vd}${s.sp?'<span class="text-orange-400 text-xs ml-2">小盘严格止损</span>':''}</div>
        </div>
      </div>
    </div>
    <div class="py-1.5 text-center cursor-pointer" onclick="tog('${id}')">
      <span id="etxt-${id}" class="text-xs" style="color:#60a5fa">▼ 展开详情</span>
    </div>
  </div>`;
}

// ═══ 渲染（完整重建）═══
function renderAll(){
  const d = D[curDate];
  // header
  document.getElementById('rdate').textContent = curDate;
  document.getElementById('utime').textContent = '更新: '+d.upd;
  // history tabs
  document.getElementById('htabs').innerHTML = Object.keys(D).sort().reverse()
    .map(dt=>`<button class="hb${dt===curDate?' a':''}" onclick="switchDate('${dt}')">${dt.slice(5)}</button>`).join('');
  // market
  const ms=d.ms;
  document.getElementById('mkt').innerHTML=['SPY','QQQ','VIX'].map(sym=>{
    const s=ms[sym],up=sym==='VIX'?s.c>0:s.c>=0;
    return`<div class="flex flex-col items-center px-3 py-2 rounded-lg" style="background:#0f172a">
      <span class="text-xs text-slate-400">${sym}</span><span class="text-sm font-bold">$${s.p}</span>
      <span class="text-xs ${up?'up':'down'}">${s.c>=0?'+':''}${s.c}%</span></div>`;
  }).join('');
  document.getElementById('msum').textContent = ms.sum;
  // stocks
  const scrStocks = d.stocks.filter(s=>SCR_TICKERS.includes(s.t));
  document.getElementById('scount').textContent = `共 ${scrStocks.length} 只`;
  document.getElementById('slist').innerHTML = scrStocks.map((s,i)=>card(s,i,'scr')).join('');
  // pool
  renderPool();
}

function renderPool(){
  const pool = wl[curPool]||[];
  const sm = stockMap();
  if(!pool.length){
    document.getElementById('plist').innerHTML=`<div class="card p-8 text-center text-slate-500 text-sm">
      暂无股票<br><span class="text-xs block mt-1">用上方输入框添加，或在今日筛选中点「加入池子」</span></div>`;
    return;
  }
  document.getElementById('plist').innerHTML = pool.map((item,i)=>{
    const s = sm[item.t];
    if(s) return card(s, i, 'pool');
    return `<div class="card p-3 flex items-center justify-between gap-3" id="card-pool-${item.t}">
      <div class="flex-1">
        <div class="flex gap-2 items-center"><span class="font-bold">${item.t}</span>
          <span class="text-xs text-slate-500">今日无数据</span></div>
        <div class="text-xs text-slate-400 mt-0.5">${item.note||''}</div>
      </div>
      ${kline(item.t)}
      <button class="br ml-2" data-action="rmpool" data-ticker="${item.t}">移出</button>
    </div>`;
  }).join('');
}

// 同步更新筛选列表中某只股票的按钮（不重建整个列表）
function refreshScrBtn(ticker){
  const po = poolOf(ticker);
  // 找到筛选列表中对应卡片
  const area = document.querySelector(`#card-scr-${ticker} .pool-btn-area`);
  if(!area) return;
  if(po){
    area.innerHTML=`<span class="bm text-xs">✓${POOL_NAMES[po]}</span>
      <button class="br" data-action="rm" data-ticker="${ticker}">移出</button>`;
  } else {
    const sm=stockMap(), s=sm[ticker];
    area.innerHTML=`<button class="ba" data-action="add" data-ticker="${ticker}" data-co="${s?s.co:''}">＋加入池子</button>`;
  }
}

// ═══ 事件委托（全局一个监听）═══
document.addEventListener('click', function(e){
  const btn = e.target.closest('[data-action]');
  if(!btn) return;
  e.stopPropagation();
  const action = btn.dataset.action;
  const ticker = btn.dataset.ticker;

  if(action==='add'){
    // 打开 modal 选择池子
    pendingTicker = ticker;
    document.getElementById('mtk').textContent = ticker;
    document.getElementById('modal').classList.remove('hidden');
  }
  else if(action==='rm'){
    // 从筛选移出池子 → 更新按钮 + 重建股票池（如果当前在看股票池）
    removeStock(ticker);
    refreshScrBtn(ticker);
    if(curTab==='p') renderPool();
  }
  else if(action==='rmpool'){
    // 从股票池移出 → 重建股票池 + 更新筛选按钮
    removeStock(ticker);
    renderPool();
    refreshScrBtn(ticker);
  }
});

function removeStock(ticker){
  Object.keys(wl).forEach(k=>{ wl[k]=wl[k].filter(x=>x.t!==ticker); });
  save();
}

function confirmAdd(pool){
  removeStock(pendingTicker);
  if(!wl[pool]) wl[pool]=[];
  const sm=stockMap(), s=sm[pendingTicker];
  wl[pool].push({t:pendingTicker, note:s?s.co:''});
  save();
  closeModal();
  // 1. 更新筛选列表中这只股票的按钮
  refreshScrBtn(pendingTicker);
  // 2. 如果当前在股票池页面 → 重建列表
  if(curTab==='p') renderPool();
}

function closeModal(){ document.getElementById('modal').classList.add('hidden'); }
document.getElementById('modal').addEventListener('click',function(e){if(e.target===this)closeModal();});

// ═══ 手动添加 ═══
function manualAdd(){
  const inp=document.getElementById('addInput'), msg=document.getElementById('addMsg');
  const t=inp.value.trim().toUpperCase();
  if(!t){showMsg('请输入股票代码','red');return;}
  if(inPool(t)){showMsg(`${t} 已在${POOL_NAMES[poolOf(t)]}池`,'yellow');return;}
  if(!wl[curPool]) wl[curPool]=[];
  wl[curPool].push({t, note:''});
  save();
  inp.value='';
  showMsg(`✅ ${t} 已加入${POOL_NAMES[curPool]}池`,'green');
  renderPool();
  refreshScrBtn(t);
}
function showMsg(text,color){
  const m=document.getElementById('addMsg');
  m.style.color={green:'#4ade80',red:'#f87171',yellow:'#fbbf24'}[color];
  m.textContent=text; m.classList.remove('hidden');
  setTimeout(()=>m.classList.add('hidden'),3000);
}

// ═══ 展开/收起 ═══
function tog(id){
  const el=document.getElementById('det-'+id), bt=document.getElementById('etxt-'+id);
  if(!el) return;
  el.classList.toggle('open');
  bt.textContent = el.classList.contains('open')?'▲ 收起':'▼ 展开详情';
}

// ═══ Tab / Pool 切换 ═══
function switchTab(t){
  curTab=t;
  document.getElementById('ps').classList.toggle('hidden',t!=='s');
  document.getElementById('pp').classList.toggle('hidden',t!=='p');
  document.getElementById('ts').className=t==='s'?'tab-a flex-1 py-2 text-sm font-medium':'tab-i flex-1 py-2 text-sm font-medium';
  document.getElementById('tp').className=t==='p'?'tab-a flex-1 py-2 text-sm font-medium':'tab-i flex-1 py-2 text-sm font-medium';
  if(t==='p') renderPool();
}
function switchDate(d){ curDate=d; renderAll(); }
function switchPool(p){
  curPool=p;
  ['core','watch','opportunity','holding'].forEach(k=>{
    document.getElementById('pt'+k).className=k===p?'pt-a text-xs px-3 py-1.5':'pt-i text-xs px-3 py-1.5';
  });
  renderPool();
}

// 卡片 id 规则：scr0...scrN，pool0...poolN
// card DOM id：card-scr-TICKER，card-pool-TICKER
// 注意：重命名 card id 为 ctx+ticker 便于精准定位
renderAll();
</script>

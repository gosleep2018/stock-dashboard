<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>📊 美股每日选股报告</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
body{background:#0f172a;color:#e2e8f0;font-family:-apple-system,'PingFang SC',sans-serif}
.card{background:#1e293b;border:1px solid #334155;border-radius:12px}
.up{color:#22c55e}.down{color:#ef4444}.neu{color:#94a3b8}
.tab-a{background:#3b82f6;color:#fff}.tab-i{background:#1e293b;color:#94a3b8}
.pta{background:#3b82f6;color:#fff;border-radius:9999px;border:none;cursor:pointer}
.pti{background:#1e293b;color:#94a3b8;border:1px solid #334155;border-radius:9999px;cursor:pointer}
.det{display:none}.det.open{display:block}
.hb{font-size:11px;padding:3px 10px;border-radius:6px;cursor:pointer;border:1px solid #334155;background:#1e293b;color:#94a3b8;white-space:nowrap}
.hb.a{border-color:#3b82f6;color:#60a5fa;background:#1e3a5f}
.bb{background:#450a0a;color:#f87171;font-size:11px;padding:1px 6px;border-radius:4px}
.bc{background:#92400e;color:#fbbf24;font-size:11px;padding:1px 6px;border-radius:4px}
.bs{background:#1e3a5f;color:#60a5fa;font-size:11px;padding:1px 6px;border-radius:4px}

.kw{width:140px;height:90px;flex-shrink:0;border-radius:8px;overflow:hidden;background:#0f172a;cursor:pointer;position:relative}
.kw iframe{width:100%;height:100%;border:none;pointer-events:none}.kw:hover{outline:2px solid #3b82f6}

#kmodal{display:none;position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.85);align-items:center;justify-content:center}
#kmodal.open{display:flex}
#kmodal .km-box{background:#1e293b;border-radius:16px;overflow:hidden;width:min(680px,96vw);box-shadow:0 25px 60px rgba(0,0,0,.6)}
#kmodal .km-head{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-bottom:1px solid #334155}
#kmodal .km-title{font-weight:700;font-size:15px;color:#e2e8f0}
#kmodal .km-close{cursor:pointer;color:#94a3b8;font-size:20px;line-height:1;background:none;border:none;padding:4px 8px}
#kmodal .km-close:hover{color:#e2e8f0}
#kmodal iframe{width:100%;height:380px;border:none;display:block}
</style>
</head>
<body class="min-h-screen">

<div class="sticky top-0 z-10 px-4 py-3 flex justify-between items-center" style="background:#0f172a;border-bottom:1px solid #1e293b">
  <div><span class="font-bold">📊 美股选股日报</span><span id="rdate" class="text-xs text-slate-400 ml-2"></span></div>
  <div id="utime" class="text-xs text-slate-500"></div>
</div>

<div class="max-w-2xl mx-auto px-4 py-4 space-y-3">
  <div class="flex gap-2 overflow-x-auto pb-1" id="htabs"></div>
  <div class="card p-4">
    <div class="text-xs text-slate-400 mb-2 font-semibold uppercase tracking-wider">市场概况</div>
    <div class="flex gap-2 mb-3" id="mkt"></div>
    <div id="msum" class="text-sm text-slate-300 leading-relaxed"></div>
  </div>
  <div class="card p-3 flex items-center gap-2 flex-wrap">
    <span class="text-xs text-slate-400">筛选：</span>
    <span class="text-xs px-2 py-0.5 rounded-full" style="background:#1e3a5f;color:#60a5fa">科技股</span>
    <span class="text-xs px-2 py-0.5 rounded-full" style="background:#14532d;color:#4ade80">开盘涨</span>
    <span class="text-xs px-2 py-0.5 rounded-full" style="background:#451a03;color:#fb923c">量比&gt;5x</span>
    <span id="scount" class="ml-auto text-xs text-slate-400"></span>
  </div>
  <div class="flex rounded-xl overflow-hidden border border-slate-700">
    <button id="ts" onclick="switchTab('s')" class="tab-a flex-1 py-2 text-sm font-medium">🔍 今日筛选</button>
    <button id="tp" onclick="switchTab('p')" class="tab-i flex-1 py-2 text-sm font-medium">📋 股票池</button>
  </div>
  <div id="ps"><div id="slist" class="space-y-3"></div></div>
  <div id="pp" class="hidden">
    <div class="flex gap-2 mb-3 flex-wrap">
      <button id="ptcore" onclick="switchPool('core')" class="pta text-xs px-3 py-1.5">🔵 核心</button>
      <button id="ptwatch" onclick="switchPool('watch')" class="pti text-xs px-3 py-1.5">👀 观察</button>
      <button id="ptopp" onclick="switchPool('opportunity')" class="pti text-xs px-3 py-1.5">⚡ 机会</button>
      <button id="pthold" onclick="switchPool('holding')" class="pti text-xs px-3 py-1.5">💼 持仓</button>
    </div>

    <div id="plist" class="space-y-2"></div>
  </div>
</div>

</div>

<script>
// ═══ 全局状态 ═══
const PN = {core:'核心',watch:'观察',opportunity:'机会',holding:'持仓'};
const BASE = 'https://raw.githubusercontent.com/gosleep2018/stock-dashboard/main/';
const SCR = ['PRSO','SYNX','TURB','QCLS','AIFF','MRVL','IOT','NA','MVIS','QH'];

let D = {};            // 日期 → 报告数据
let curDate = '';
let curPool = 'core';
let curTab = 's';

// ── localStorage 股票池（唯一数据源）──
const DEF = {
  core:  ['SPY','QQQ','NVDA','MSFT','GOOGL'].map(t=>({t,note:''})),
  watch: ['MRVL','ALNT','IOT'].map(t=>({t,note:''})),
  opportunity: ['SYNX','TURB'].map(t=>({t,note:''})),
  holding: []
};
let WL = JSON.parse(localStorage.getItem('wlv5') || 'null');
if(!WL){ WL = JSON.parse(JSON.stringify(DEF)); saveWL(); }
function saveWL(){ localStorage.setItem('wlv5', JSON.stringify(WL)); }

// ── 查询工具 ──
function poolOf(t){ for(const[k,a] of Object.entries(WL)){ if(a.some(x=>x.t===t)) return k; } return null; }
function inPool(t){ return poolOf(t) !== null; }
function SM(){ const m={}; (D[curDate]?.stocks||[]).forEach(s=>m[s.t]=s); return m; }

// ═══ 数据加载 ═══
async function loadDates(){
  try{
    const r = await fetch(BASE+'data/dates.json?_='+Date.now());
    if(!r.ok) return [];
    return await r.json();
  }catch{ return []; }
}

async function loadReport(date){
  if(D[date]) return;
  try{
    const r = await fetch(BASE+`data/${date}.json?_=`+Date.now());
    if(!r.ok) return;
    D[date] = await r.json();
  }catch(e){ console.warn('load fail', date, e); }
}

// ═══ K线 ═══
function kline(t){
  // 小图用 mini-symbol-overview（线图，官方小尺寸组件，1个月视图）
  const cfg = JSON.stringify({
    symbol: t, width: 140, height: 90,
    dateRange: "1M", colorTheme: "dark",
    trendLineColor: "#38bdf8",
    underLineColor: "rgba(56,189,248,.06)",
    isTransparent: true, autosize: false, locale: "zh_CN"
  });
  const src = "https://s.tradingview.com/embed-widget/mini-symbol-overview/?locale=zh_CN#"
              + encodeURIComponent(cfg);
  return `<div class="kw" onclick="event.stopPropagation();openKModal('${t}')" title="点击放大日K">
    <iframe src="${src}" scrolling="no" frameborder="0"
      allowtransparency="true" style="width:100%;height:100%;pointer-events:none"></iframe>
  </div>`;
}

function openKModal(t){
  // 大图用 advanced-chart widget：强制日K（interval=D），3个月，带完整工具栏
  const cfg = JSON.stringify({
    symbol: t, interval: "D", range: "3M",
    width: "100%", height: 380,
    hide_side_toolbar: false, hide_top_toolbar: false,
    allow_symbol_change: false, save_image: false,
    colorTheme: "dark", locale: "zh_CN",
    backgroundColor: "rgba(15,23,42,1)",
    gridColor: "rgba(51,65,85,0.4)",
    withdateranges: true, style: "1",
    timezone: "Asia/Shanghai"
  });
  const src = "https://s.tradingview.com/widgetembed/?frameElementId=tv_km&symbol="
    + t + "&interval=D&range=3M&hidesidetoolbar=0&hidetoptoolbar=0"
    + "&symboledit=0&saveimage=0&theme=dark&style=1"
    + "&timezone=Asia%2FShanghai&locale=zh_CN&withdateranges=1";
  document.getElementById('km-title').innerHTML =
    `<a href="https://www.tradingview.com/chart/?symbol=${t}" target="_blank"
      style="color:#60a5fa;text-decoration:none">${t} 🔗</a> — 日K线（近3个月）`;
  document.getElementById('km-iframe').src = src;
  document.getElementById('kmodal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeKModal(){
  document.getElementById('kmodal').classList.remove('open');
  document.getElementById('km-iframe').src = '';
  document.body.style.overflow = '';
}

// ═══ 卡片 HTML ═══
function cardHTML(s, idx, ctx){
  const po = poolOf(s.t);


  const stars = '⭐'.repeat(s.sc)||'<span class="neu text-xs">—</span>';
  const cc=s.ch>=0?'up':'down', cs=s.ch>=0?'+':'';
  const spec = s.sp?`<span style="background:#451a03;color:#fb923c;font-size:11px;padding:1px 6px;border-radius:4px">⚠️小盘</span>`:'';
  const mab = s.mas==='多头'?`<span class="bm">↑多头✅</span>`:`<span class="bb">↓空头⚠️</span>`;
  const crb = s.cr&&s.cr!=='无穿越'?`<span class="bc">${s.cr==='金叉'?'🟡金叉':'💀死叉'} ${s.cd||''}</span>`:'';
  const sub = s.su?`<span class="bs">⚡突然放量</span>`:'';
  const nc = s.news?.se==='利好'?'#4ade80':s.news?.se==='利空'?'#f87171':'#94a3b8';
  const ni = s.news?.se==='利好'?'📈':s.news?.se==='利空'?'📉':'📰';
  const vd = s.sc>=3?'🚀 强势启动':s.sc===2?'👀 值得关注':s.sc===1?'⚠️ 信号偏弱':'❌ 跳过';
  const id = `${ctx}${idx}`;

  return `<div class="card overflow-hidden" id="CARD-${ctx}-${s.t}"
      onmouseenter="this.style.borderColor='#4f86f7'" onmouseleave="this.style.borderColor='#334155'" style="transition:border-color .2s">
  <div class="p-3 cursor-pointer" onclick="tog('${id}')">
    <div class="flex items-start gap-3">
      <div class="flex-1 min-w-0">
        <div class="flex items-center gap-1.5 flex-wrap">
          <a href="https://www.tradingview.com/chart/?symbol=${s.t}" target="_blank"
            onclick="event.stopPropagation()"
            class="text-base font-bold hover:text-blue-400" style="text-decoration:none;transition:color .15s">${s.t} 🔗</a>
          <span class="text-base font-bold">$${s.p}</span>
          <span class="text-sm font-semibold ${cc}">${cs}${(+s.ch).toFixed(1)}%</span>
          ${spec}
        </div>
        <div class="text-xs text-slate-400 mt-0.5 truncate">${s.co||''}</div>
        <div class="flex items-center gap-1.5 mt-1 flex-wrap">
          <span>${stars}</span>
          <span class="text-xs text-slate-400">量<span style="color:#fb923c;font-weight:700">${s.vr}x</span></span>
          <span class="text-xs ${(s.fh||0)>-15?'up':'neu'}">高${s.fh}%</span>
        </div>
        <div class="flex gap-1 mt-1 flex-wrap">${mab}${crb}${sub}</div>

      </div>
      ${kline(s.t)}
    </div>
  </div>
  <div id="DET-${id}" class="det" style="border-top:1px solid #334155">
    <div class="p-4 space-y-3">
      <div class="grid grid-cols-2 gap-3">
        <div class="rounded-xl p-3 text-sm" style="background:#0f172a">
          <div class="text-xs text-slate-400 mb-1">① 放量情况</div>
          <div class="font-semibold">近10日 <span style="color:#fb923c">${s.sd||0}</span> 天放量</div>
          <div class="text-xs text-slate-500 mt-1">${(s.sdt||[]).length?(s.sdt).join(', '):'无'}</div>
          <div class="text-xs mt-1 ${s.su?'up':'neu'}">${s.su?'✅ 近2日突然放量':'无突然放量'}</div>
        </div>
        <div class="rounded-xl p-3 text-sm" style="background:#0f172a">
          <div class="text-xs text-slate-400 mb-1">③ 均线状态</div>
          <div class="text-xs">MA30: <span class="font-mono">${s.m30??'N/A'}</span></div>
          <div class="text-xs">MA60: <span class="font-mono">${s.m60??'N/A'}</span></div>
          <div class="text-xs mt-1 font-semibold">${s.cr&&s.cr!=='无穿越'?(s.cr==='金叉'?'🟡金叉 ':'💀死叉 ')+(s.cd||''):'无近期穿越'}</div>
          <div class="text-xs ${s.mas==='多头'?'up':'down'}">${s.mas==='多头'?'↑多头排列':'↓空头排列'}</div>
        </div>
      </div>
      <div class="rounded-xl p-3 text-sm" style="background:#0f172a">
        <div class="text-xs text-slate-400 mb-1">④ 事件热点</div>
        <div style="color:${nc}">${ni} ${s.news?.h||'暂无新闻'}</div>
        <div class="text-xs text-slate-500 mt-1">${s.news?.d||''}</div>
      </div>
      <div class="rounded-xl p-3" style="background:#0f172a">
        <div class="text-xs text-slate-400 mb-1">综合结论</div>
        <div class="text-sm font-semibold">${vd}${s.sp?'<span class="text-orange-400 text-xs ml-2">小盘严格止损</span>':''}</div>
      </div>
    </div>
  </div>
  <div class="py-1.5 text-center cursor-pointer" onclick="tog('${id}')">
    <span id="ET-${id}" class="text-xs" style="color:#60a5fa">▼ 展开详情</span>
  </div>
</div>`;
}

// 无数据简单行（股票池中未被筛选的股票）
function simpleRow(item){
  return `<div class="card p-3 flex items-center justify-between gap-3" id="CARD-pool-${item.t}">
    <div class="flex-1">
      <div class="flex gap-2 items-center">
        <a href="https://www.tradingview.com/chart/?symbol=${item.t}" target="_blank"
          class="font-bold hover:text-blue-400" style="text-decoration:none">${item.t} 🔗</a>
        <span class="text-xs text-slate-500">今日无筛选数据</span>
      </div>
      <div class="text-xs text-slate-400 mt-0.5">${item.note||''}</div>
    </div>
    ${kline(item.t)}
  </div>`;
}

// ═══ 渲染 ═══
function renderHeader(){
  const d = D[curDate];
  if(!d) return;
  document.getElementById('rdate').textContent = curDate;
  document.getElementById('utime').textContent = '更新: '+(d.upd||d.update_time||'');
  const dates = Object.keys(D).sort().reverse();
  document.getElementById('htabs').innerHTML = dates.map(dt=>
    `<button class="hb${dt===curDate?' a':''}" onclick="switchDate('${dt}')">${dt.slice(5)}</button>`
  ).join('');
  const ms = d.ms || d.market_summary || {};
  document.getElementById('mkt').innerHTML = ['SPY','QQQ','VIX'].map(sym=>{
    const s=ms[sym]||{p:0,c:0}; const up=sym==='VIX'?s.c>0:s.c>=0;
    return `<div class="flex flex-col items-center px-3 py-2 rounded-lg" style="background:#0f172a">
      <span class="text-xs text-slate-400">${sym}</span>
      <span class="text-sm font-bold">$${s.p}</span>
      <span class="text-xs ${up?'up':'down'}">${s.c>=0?'+':''}${s.c}%</span>
    </div>`;
  }).join('');
  document.getElementById('msum').textContent = ms.sum || ms.summary || '';
}

function renderScreener(){
  const stocks = (D[curDate]?.stocks||[]).slice().sort((a,b)=>(b.sc||0)-(a.sc||0));
  document.getElementById('scount').textContent = `共 ${stocks.length} 只`;
  document.getElementById('slist').innerHTML = stocks.map((s,i)=>cardHTML(s,i,'scr')).join('') ||
    '<div class="card p-8 text-center text-slate-500">今日暂无数据</div>';
}

function renderPool(){
  const pool = WL[curPool]||[];
  const sm = SM();
  if(!pool.length){
    document.getElementById('plist').innerHTML = `<div class="card p-8 text-center text-slate-500 text-sm">
      暂无股票<br><span class="text-xs block mt-1">在今日筛选中点「加入池子」，或用上方输入框添加</span></div>`;
    return;
  }
  document.getElementById('plist').innerHTML = pool.map((item,i)=>{
    const s = sm[item.t];
    return s ? cardHTML(s, i, 'pool') : simpleRow(item);
  }).join('');
}

function renderAll(){
  renderHeader();
  renderScreener();
  renderPool();
}

// ── 展开/收起 ──
function tog(id){
  const el = document.getElementById('DET-'+id);
  const bt = document.getElementById('ET-'+id);
  if(!el||!bt) return;
  el.classList.toggle('open');
  bt.textContent = el.classList.contains('open') ? '▲ 收起' : '▼ 展开详情';
}

// ── Tab / Pool 切换 ──
function switchTab(t){
  curTab = t;
  document.getElementById('ps').classList.toggle('hidden', t!=='s');
  document.getElementById('pp').classList.toggle('hidden', t!=='p');
  document.getElementById('ts').className = t==='s'?'tab-a flex-1 py-2 text-sm font-medium':'tab-i flex-1 py-2 text-sm font-medium';
  document.getElementById('tp').className = t==='p'?'tab-a flex-1 py-2 text-sm font-medium':'tab-i flex-1 py-2 text-sm font-medium';
  if(t==='p') renderPool();
}
function switchPool(p){
  curPool = p;
  ['core','watch','opportunity','holding'].forEach(k=>{
    document.getElementById('pt'+k).className = k===p?'pta text-xs px-3 py-1.5':'pti text-xs px-3 py-1.5';
  });
  renderPool();
}
async function switchDate(d){
  await loadReport(d);
  curDate = d;
  renderAll();
  // 更新历史Tab高亮
  document.querySelectorAll('#htabs .hb').forEach(b=>{
    b.classList.toggle('a', b.textContent===d.slice(5));
  });
}

// ═══ 启动 ═══
async function init(){
  document.getElementById('slist').innerHTML = '<div class="card p-8 text-center text-slate-400">⏳ 加载数据中...</div>';
  const dates = await loadDates();
  if(dates.length > 0){
    curDate = dates[0];
    await loadReport(curDate);
    dates.slice(1).forEach(d => loadReport(d)); // 预加载其余
  } else {
    // fallback：用本地日期
    curDate = new Date().toISOString().slice(0,10);
    await loadReport(curDate);
  }
  renderAll();
}

init();
document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeKModal(); });
</script>

<!-- K线放大 Modal -->
<div id="kmodal" onclick="if(event.target===this)closeKModal()">
  <div class="km-box">
    <div class="km-head">
      <span id="km-title" class="km-title"></span>
      <button class="km-close" onclick="closeKModal()">✕</button>
    </div>
    <iframe id="km-iframe" src="" frameborder="0" allowtransparency="true"></iframe>
  </div>
</div>
</body>
</html>

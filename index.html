<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📊 美股每日选股报告</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
body{background:#0f172a;color:#e2e8f0;font-family:-apple-system,'PingFang SC',sans-serif}
.card{background:#1e293b;border:1px solid #334155;border-radius:12px}
.up{color:#22c55e}.down{color:#ef4444}.neutral{color:#94a3b8}
.tab-act{background:#3b82f6;color:#fff}
.tab-inact{background:#1e293b;color:#94a3b8}
.ptab-act{background:#3b82f6;color:#fff;border-radius:9999px;border:none}
.ptab-inact{background:#1e293b;color:#94a3b8;border:1px solid #334155;border-radius:9999px}
.detail{display:none}.detail.open{display:block}
.hbtn{font-size:11px;padding:3px 10px;border-radius:6px;cursor:pointer;border:1px solid #334155;background:#1e293b;color:#94a3b8;white-space:nowrap}
.hbtn.act{border-color:#3b82f6;color:#60a5fa;background:#1e3a5f}
.pbtn-add{font-size:11px;padding:2px 8px;border-radius:4px;cursor:pointer;background:#1e3a5f;color:#60a5fa;border:none}
.pbtn-rm{font-size:11px;padding:2px 8px;border-radius:4px;cursor:pointer;background:#450a0a;color:#f87171;border:none}
.pbtn-add:hover{background:#2563eb;color:#fff}
.pbtn-rm:hover{background:#dc2626;color:#fff}
input[type=text]{background:#0f172a;border:1px solid #334155;border-radius:8px;color:#e2e8f0;padding:8px 12px;width:100%;outline:none}
input[type=text]:focus{border-color:#3b82f6}
.badge-cross{background:#92400e;color:#fbbf24;font-size:11px;padding:1px 6px;border-radius:4px}
.badge-ma-bull{background:#14532d;color:#4ade80;font-size:11px;padding:1px 6px;border-radius:4px}
.badge-ma-bear{background:#450a0a;color:#f87171;font-size:11px;padding:1px 6px;border-radius:4px}
.badge-surge{background:#1e3a5f;color:#60a5fa;font-size:11px;padding:1px 6px;border-radius:4px}
</style>
</head>
<body class="min-h-screen">

<!-- Header -->
<div class="sticky top-0 z-10 px-4 py-3 flex items-center justify-between" style="background:#0f172a;border-bottom:1px solid #1e293b">
  <div>
    <span class="font-bold">📊 美股选股日报</span>
    <span id="rdate" class="text-xs text-slate-400 ml-2"></span>
  </div>
  <div id="utime" class="text-xs text-slate-500"></div>
</div>

<div class="max-w-2xl mx-auto px-4 py-4 space-y-3">

  <!-- 历史日期 -->
  <div class="flex gap-2 overflow-x-auto pb-1" id="htabs"></div>

  <!-- 市场概况 -->
  <div class="card p-4">
    <div class="text-xs text-slate-400 mb-2 font-semibold uppercase tracking-wider">市场概况</div>
    <div class="flex gap-2 mb-3" id="mkt"></div>
    <div id="msum" class="text-sm text-slate-300 leading-relaxed"></div>
  </div>

  <!-- 筛选条件 -->
  <div class="card p-3 flex items-center gap-2 flex-wrap">
    <span class="text-xs text-slate-400">筛选：</span>
    <span class="text-xs px-2 py-0.5 rounded-full" style="background:#1e3a5f;color:#60a5fa">科技股</span>
    <span class="text-xs px-2 py-0.5 rounded-full" style="background:#14532d;color:#4ade80">开盘涨</span>
    <span class="text-xs px-2 py-0.5 rounded-full" style="background:#451a03;color:#fb923c">量比&gt;5x</span>
    <span id="scount" class="ml-auto text-xs text-slate-400"></span>
  </div>

  <!-- 主Tab -->
  <div class="flex rounded-xl overflow-hidden border border-slate-700">
    <button onclick="switchTab('s')" id="ts" class="tab-act flex-1 py-2 text-sm font-medium">🔍 今日筛选</button>
    <button onclick="switchTab('p')" id="tp" class="tab-inact flex-1 py-2 text-sm font-medium">📋 股票池</button>
  </div>

  <!-- 今日筛选 -->
  <div id="ps"><div id="slist" class="space-y-3"></div></div>

  <!-- 股票池 -->
  <div id="pp" class="hidden">
    <!-- 子池Tab -->
    <div class="flex gap-2 mb-3 flex-wrap">
      <button onclick="switchPool('core')" id="ptcore" class="ptab-act text-xs px-3 py-1.5">🔵 核心</button>
      <button onclick="switchPool('watch')" id="ptwatch" class="ptab-inact text-xs px-3 py-1.5">👀 观察</button>
      <button onclick="switchPool('opportunity')" id="ptopp" class="ptab-inact text-xs px-3 py-1.5">⚡ 机会</button>
      <button onclick="switchPool('holding')" id="pthold" class="ptab-inact text-xs px-3 py-1.5">💼 持仓</button>
    </div>

    <!-- 自定义添加股票 -->
    <div class="card p-3 mb-3">
      <div class="text-xs text-slate-400 mb-2">➕ 手动添加股票到当前池子</div>
      <div class="flex gap-2">
        <input type="text" id="addInput" placeholder="输入股票代码，如 AAPL" maxlength="10"
          onkeydown="if(event.key==='Enter')manualAdd()"
          style="flex:1;text-transform:uppercase">
        <button onclick="manualAdd()" class="px-4 py-2 rounded-lg text-sm font-medium" style="background:#1e3a5f;color:#60a5fa;border:none;cursor:pointer;white-space:nowrap">添加</button>
      </div>
      <div id="addMsg" class="text-xs mt-1.5 hidden"></div>
    </div>

    <div id="plist" class="space-y-2"></div>
  </div>

</div>

<!-- 加入池子 Modal -->
<div id="modal" class="hidden fixed inset-0 z-50 flex items-end justify-center" style="background:rgba(0,0,0,.75)">
  <div class="card w-full max-w-2xl p-5 rounded-b-none rounded-t-2xl">
    <div class="text-base font-semibold mb-1">选择加入的池子</div>
    <div id="mticker" class="text-2xl font-bold mb-4 text-blue-400"></div>
    <div class="grid grid-cols-2 gap-2 mb-3">
      <button onclick="addToPool('core')" class="py-3 rounded-xl text-sm font-medium" style="background:#1e3a5f;color:#60a5fa;border:none;cursor:pointer">🔵 核心池</button>
      <button onclick="addToPool('watch')" class="py-3 rounded-xl text-sm font-medium" style="background:#1e3a5f;color:#60a5fa;border:none;cursor:pointer">👀 观察池</button>
      <button onclick="addToPool('opportunity')" class="py-3 rounded-xl text-sm font-medium" style="background:#1e3a5f;color:#60a5fa;border:none;cursor:pointer">⚡ 机会池</button>
      <button onclick="addToPool('holding')" class="py-3 rounded-xl text-sm font-medium" style="background:#1a3a1a;color:#4ade80;border:none;cursor:pointer">💼 持仓</button>
    </div>
    <button onclick="closeModal()" class="w-full py-2 rounded-xl text-sm text-slate-400" style="background:#0f172a;border:none;cursor:pointer">取消</button>
  </div>
</div>

// ─── 状态 ───
let curDate = Object.keys(REPORTS).sort().reverse()[0];
let curPool = 'core';
let curTab = 's';
let modalTicker = '';
let modalNote = '';

const DEFAULT_WL = {
  core:[{ticker:"SPY",note:"标普500 ETF，定投主仓"},{ticker:"QQQ",note:"纳斯达克100 ETF"},{ticker:"NVDA",note:"AI芯片龙头"},{ticker:"MSFT",note:"云计算+AI"},{ticker:"GOOGL",note:"搜索+云"}],

  holding:[]
};

let wl = JSON.parse(localStorage.getItem('wl2') || 'null');
if(!wl){ wl = JSON.parse(JSON.stringify(DEFAULT_WL)); saveWL(); }
function saveWL(){ localStorage.setItem('wl2', JSON.stringify(wl)); }

// ─── 工具函数 ───
function getStockMap(){
  const d = REPORTS[curDate];
  const m = {};
  d.stocks.forEach(s => m[s.ticker] = s);
  return m;
}

function isInPool(ticker){
  return Object.values(wl).some(arr => arr.some(x => x.ticker === ticker));
}

function getPoolOf(ticker){
  for(const [k,arr] of Object.entries(wl)){
    if(arr.some(x => x.ticker === ticker)) return k;
  }
  return null;
}

// ─── 股票卡片（复用于筛选和股票池）───
function stockCard(s, i, context='screener'){
  const inP = isInPool(s.ticker);
  const poolOf = getPoolOf(s.ticker);
  const poolNames = {core:'核心',watch:'观察',opportunity:'机会',holding:'持仓'};
  
  // 在池子按钮
  let pBtn = '';
  if(context === 'screener'){
    if(inP){
      pBtn = `<span class="text-xs px-1.5 py-0.5 rounded" style="background:#14532d;color:#4ade80">✓ ${poolNames[poolOf]}</span>
              <button class="pbtn-rm" onclick="removeFromPool('${s.ticker}');event.stopPropagation()">移出</button>`;
    } else {
      pBtn = `<button class="pbtn-add" onclick="openAdd('${s.ticker}','${s.company}');event.stopPropagation()">＋ 加入池子</button>`;
    }
  } else {
    pBtn = `<button class="pbtn-rm" onclick="rmFromPool('${s.ticker}');event.stopPropagation()">移出</button>`;
  }

  const stars = '⭐'.repeat(s.score) || '<span class="text-slate-600 text-xs">—</span>';
  const cc = s.change_pct >= 0 ? 'up' : 'down';
  const cs = s.change_pct >= 0 ? '+' : '';
  const specBadge = s.speculative ? `<span class="text-xs px-1.5 py-0.5 rounded" style="background:#451a03;color:#fb923c">⚠️小盘</span>` : '';

  // 均线+金叉徽章
  const maBadge = s.ma_status === '多头'
    ? `<span class="badge-ma-bull">MA多头✅</span>`
    : `<span class="badge-ma-bear">MA空头⚠️</span>`;
  const crossBadge = s.cross !== '无穿越'
    ? `<span class="badge-cross">${s.cross==='金叉'?'🟡金叉':'💀死叉'} ${s.cross_date}</span>` : '';
  const surgeBadge = s.sudden_surge
    ? `<span class="badge-surge">⚡突然放量</span>` : '';

  const nc = s.news.sentiment==='利好'?'#4ade80':s.news.sentiment==='利空'?'#f87171':'#94a3b8';
  const ni = s.news.sentiment==='利好'?'📈':s.news.sentiment==='利空'?'📉':'📰';
  const verdict = s.score>=3?'🚀 强势启动，值得关注':s.score===2?'👀 有信号，需观察':s.score===1?'⚠️ 信号偏弱，谨慎':' ❌ 信号不足，跳过';

  const prefix = context === 'pool' ? 'p' : '';

  return `<div class="card overflow-hidden" style="transition:border-color .2s" onmouseenter="this.style.borderColor='#4f86f7'" onmouseleave="this.style.borderColor='#334155'">
  <div class="p-4 cursor-pointer" onclick="toggle('${prefix}${i}')">
    <div class="flex items-start justify-between">
      <div>
        <div class="flex items-center gap-2 flex-wrap">
          <span class="text-lg font-bold">${s.ticker}</span>
          ${specBadge}
          ${pBtn}
        </div>
        <div class="text-xs text-slate-400 mt-0.5">${s.company}</div>
      </div>
      <div class="text-right ml-2">
        <div class="text-lg font-bold">$${s.price}</div>
        <div class="text-sm font-semibold ${cc}">${cs}${s.change_pct.toFixed(1)}%</div>
      </div>
    </div>
    <div class="flex items-center gap-2 mt-2 flex-wrap">
      <span>${stars}</span>
      <span class="text-xs text-slate-400">量比 <span style="color:#fb923c;font-weight:700">${s.volume_ratio}x</span></span>
      <span class="text-xs text-slate-400">距52W高 <span class="${s.from_high_52w>-15?'up':'neutral'}">${s.from_high_52w}%</span></span>
    </div>
    <div class="flex gap-1.5 mt-2 flex-wrap">${maBadge} ${crossBadge} ${surgeBadge}</div>
  </div>

  <div id="d${prefix}${i}" class="detail" style="border-top:1px solid #334155">
    <div class="p-4 space-y-3">
      <div class="grid grid-cols-2 gap-3">
        <div class="rounded-xl p-3 text-sm" style="background:#0f172a">
          <div class="text-xs text-slate-400 mb-1">① 放量情况</div>
          <div class="font-semibold">近10日放量 <span style="color:#fb923c">${s.surge_days}</span> 天</div>
          <div class="text-xs text-slate-500 mt-1">${s.surge_dates.length?s.surge_dates.join(', '):'无明显放量'}</div>
          <div class="text-xs mt-1 ${s.sudden_surge?'up':'neutral'}">${s.sudden_surge?'✅ 近2日突然放量':'近2日无突然放量'}</div>
        </div>
        <div class="rounded-xl p-3 text-sm" style="background:#0f172a">
          <div class="text-xs text-slate-400 mb-1">③ 均线状态</div>
          <div class="text-xs">MA30: <span class="font-mono">${s.ma30??'N/A'}</span></div>
          <div class="text-xs">MA60: <span class="font-mono">${s.ma60??'N/A'}</span></div>
          <div class="text-xs mt-1 font-semibold">${s.cross!=='无穿越'?(s.cross==='金叉'?'🟡 金叉 ':'💀 死叉 ')+s.cross_date:'无近期穿越'}</div>
          <div class="text-xs mt-0.5 ${s.ma_status==='多头'?'up':'down'}">${s.ma_status==='多头'?'↑ 多头排列':'↓ 空头排列'}</div>
        </div>
      </div>
      <div class="rounded-xl p-3 text-sm" style="background:#0f172a">
        <div class="text-xs text-slate-400 mb-1">④ 事件热点 / 今日新闻</div>
        <div style="color:${nc}">${ni} ${s.news.headline}</div>
        <div class="text-xs text-slate-500 mt-1">${s.news.date}</div>
      </div>
      <div class="rounded-xl p-3" style="background:#0f172a">
        <div class="text-xs text-slate-400 mb-1">综合结论</div>
        <div class="text-sm font-semibold">${verdict}${s.speculative?'<span class="text-orange-400 text-xs ml-2">小盘严格止损</span>':''}</div>
      </div>
    </div>
  </div>

  <div class="py-1.5 text-center cursor-pointer" onclick="toggle('${prefix}${i}')">
    <span id="et${prefix}${i}" class="text-xs" style="color:#60a5fa">▼ 展开详情</span>
  </div>
</div>`;
}

// ─── 渲染 ───
function render(){
  const dates = Object.keys(REPORTS).sort().reverse();
  const d = REPORTS[curDate];

  document.getElementById('rdate').textContent = curDate;
  document.getElementById('utime').textContent = '更新: '+d.update_time;

  // 历史Tab
  document.getElementById('htabs').innerHTML = dates.map(dt=>
    `<button class="hbtn${dt===curDate?' act':''}" onclick="switchDate('${dt}')">${dt.slice(5)}</button>`
  ).join('');

  // 市场指数
  const ms = d.market_summary;
  document.getElementById('mkt').innerHTML = ['SPY','QQQ','VIX'].map(sym=>{
    const s=ms[sym]; const up=sym==='VIX'?s.change>0:s.change>=0;
    return `<div class="flex flex-col items-center px-3 py-2 rounded-lg" style="background:#0f172a">
      <span class="text-xs text-slate-400">${sym}</span>
      <span class="text-sm font-bold">$${s.price}</span>
      <span class="text-xs ${up?'up':'down'}">${s.change>=0?'+':''}${s.change}%</span>
    </div>`;
  }).join('');
  document.getElementById('msum').textContent = ms.summary;
  document.getElementById('scount').textContent = `共 ${d.stocks.filter(s=>s.change_pct>0&&[...new Set(d.stocks.map(x=>x.ticker))].includes(s.ticker)).length} 只`;

  renderStocks();
  renderPool();
}

function renderStocks(){
  const d = REPORTS[curDate];
  // 只显示今日筛选的（排除纯股票池补充数据：非零涨幅且在筛选范围内）
  const screenerTickers = ['PRSO','SYNX','TURB','QCLS','AIFF','MRVL','IOT','NA','MVIS','QH'];
  const stocks = d.stocks.filter(s => screenerTickers.includes(s.ticker));
  document.getElementById('scount').textContent = `共 ${stocks.length} 只`;
  document.getElementById('slist').innerHTML = stocks.map((s,i) => stockCard(s, i, 'screener')).join('');
}

function renderPool(){
  const pool = wl[curPool] || [];
  const sm = getStockMap();

  if(!pool.length){
    document.getElementById('plist').innerHTML = `<div class="card p-8 text-center text-slate-500 text-sm">
      暂无股票<br><span class="text-xs mt-1 block">使用上方输入框手动添加，或在「今日筛选」中点击「加入池子」</span>
    </div>`;
    return;
  }

  document.getElementById('plist').innerHTML = pool.map((item, i) => {
    const s = sm[item.ticker];
    if(s){
      // 有今日数据 → 完整卡片
      return stockCard(s, i, 'pool');
    } else {
      // 无今日数据 → 简单行
      return `<div class="card p-3 flex items-center justify-between">
        <div>
          <div class="flex items-center gap-2">
            <span class="font-bold">${item.ticker}</span>
            <span class="text-xs text-slate-500">今日无数据</span>
          </div>
          <div class="text-xs text-slate-400 mt-0.5">${item.note||''}</div>
        </div>
        <button class="pbtn-rm" onclick="rmFromPool('${item.ticker}')">移出</button>
      </div>`;
    }
  }).join('');
}

// ─── 交互 ───
function toggle(id){
  const el = document.getElementById('d'+id);
  const bt = document.getElementById('et'+id);
  if(!el) return;
  el.classList.toggle('open');
  bt.textContent = el.classList.contains('open') ? '▲ 收起' : '▼ 展开详情';
}

function switchTab(t){
  curTab = t;
  document.getElementById('ps').classList.toggle('hidden', t!=='s');
  document.getElementById('pp').classList.toggle('hidden', t!=='p');
  document.getElementById('ts').className = t==='s' ? 'tab-act flex-1 py-2 text-sm font-medium' : 'tab-inact flex-1 py-2 text-sm font-medium';
  document.getElementById('tp').className = t==='p' ? 'tab-act flex-1 py-2 text-sm font-medium' : 'tab-inact flex-1 py-2 text-sm font-medium';
}

function switchDate(d){ curDate=d; render(); }

function switchPool(p){
  curPool = p;
  ['core','watch','opportunity','holding'].forEach(k=>{
    document.getElementById('pt'+k).className = k===p ? 'ptab-act text-xs px-3 py-1.5' : 'ptab-inact text-xs px-3 py-1.5';
  });
  renderPool();
}

function isInPool(ticker){ return Object.values(wl).some(arr=>arr.some(x=>x.ticker===ticker)); }
function getPoolOf(ticker){ for(const[k,arr]of Object.entries(wl)){ if(arr.some(x=>x.ticker===ticker))return k; } return null; }

// 加入池子（从筛选）
function openAdd(ticker, company){
  modalTicker = ticker;
  modalNote = company;
  document.getElementById('mticker').textContent = ticker;
  document.getElementById('modal').classList.remove('hidden');
}

function closeModal(){ document.getElementById('modal').classList.add('hidden'); }

function addToPool(pool){
  const sm = getStockMap();
  const s = sm[modalTicker];
  const note = s ? s.company : modalNote;
  // 先从所有池子移除
  Object.keys(wl).forEach(k=>{ wl[k]=wl[k].filter(x=>x.ticker!==modalTicker); });
  if(!wl[pool]) wl[pool]=[];
  wl[pool].push({ticker:modalTicker, note});
  saveWL();
  closeModal();
  renderPool();
  renderStocks(); // 更新筛选列表的按钮状态
}

// 从筛选移出池子
function removeFromPool(ticker){
  Object.keys(wl).forEach(k=>{ wl[k]=wl[k].filter(x=>x.ticker!==ticker); });
  saveWL();
  renderStocks();
  renderPool();
}

// 从池子内移出
function rmFromPool(ticker){
  Object.keys(wl).forEach(k=>{ wl[k]=wl[k].filter(x=>x.ticker!==ticker); });
  saveWL();
  renderPool();
  renderStocks(); // 同步更新筛选列表按钮
}

// 手动输入添加
function manualAdd(){
  const input = document.getElementById('addInput');
  const msg = document.getElementById('addMsg');
  const ticker = input.value.trim().toUpperCase();
  if(!ticker){ showMsg('请输入股票代码', 'red'); return; }
  if(isInPool(ticker)){ showMsg(`${ticker} 已在${['核心','观察','机会','持仓'][['core','watch','opportunity','holding'].indexOf(getPoolOf(ticker))]}池中`, 'yellow'); return; }
  if(!wl[curPool]) wl[curPool]=[];
  wl[curPool].push({ticker, note:''});
  saveWL();
  input.value = '';
  showMsg(`✅ ${ticker} 已加入${{'core':'核心','watch':'观察','opportunity':'机会','holding':'持仓'}[curPool]}池`, 'green');
  renderPool();
  renderStocks();
}

function showMsg(text, color){
  const msg = document.getElementById('addMsg');
  const colors = {green:'#4ade80', red:'#f87171', yellow:'#fbbf24'};
  msg.style.color = colors[color]||'#94a3b8';
  msg.textContent = text;
  msg.classList.remove('hidden');
  setTimeout(()=>msg.classList.add('hidden'), 3000);
}

// 点击背景关闭modal
document.getElementById('modal').addEventListener('click', function(e){ if(e.target===this)closeModal(); });

render();
</script>
</body>
</html>
